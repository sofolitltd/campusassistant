<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Smart assistant on Campus">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="campusassistant">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>campusassistant</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
    }
    #app-loading .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(0, 0, 0, 0.1);
      border-top-color: #00897B;
      border-radius: 50%;
      animation: app-loading-spin 0.8s linear infinite;
    }
    @keyframes app-loading-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app-loading">
    <div class="spinner"></div>
  </div>

  <!-- Syncfusion PDF Viewer web integration (PdfJs 4.0+):
       https://pub.dev/packages/syncfusion_flutter_pdfviewer#web -->
  <script type="module" async>
    import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.min.mjs';
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.9.155/pdf.worker.min.mjs';
  </script>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Flutter web dispatches this once the first frame has rendered.
    window.addEventListener('flutter-first-frame', function () {
      var loading = document.getElementById('app-loading');
      if (loading) loading.remove();
    });
  </script>
</body>
</html>
