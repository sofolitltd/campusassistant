name: campusassistant
description: "Smart assistant on Campus"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4 

dependencies:
  flutter:
    sdk: flutter

  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.0.1
  firebase_core: ^4.3.0
  # cloud_firestore: ^6.1.1
  # firebase_auth: ^6.1.3
  # firebase_storage: ^13.0.5
  google_fonts: ^6.3.3
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  in_app_update: ^4.2.5
  fluttertoast: ^9.0.0
  url_launcher: ^6.3.2
  flutter_spinkit: ^5.2.2
  image_picker: ^1.2.1
  image_cropper: ^11.0.0
  flutter_image_compress: ^2.3.0
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  flutter_staggered_grid_view: ^0.7.0
  youtube_player_flutter: ^9.1.3
  dio: ^5.9.0
  permission_handler: ^12.0.1
  open_filex: ^4.7.0
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  flutter_inappwebview: ^6.1.5
  lucide_icons_flutter: ^3.1.9
  syncfusion_flutter_pdfviewer: ^32.1.22
  dartz: ^0.10.1
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: ^10.0.0
  flutter_markdown: ^0.7.7+1
  file_picker: ^10.3.10
  web_socket_channel: ^3.0.1
  pdfx: ^2.9.2
  collection: ^1.19.1
  timeago: ^3.7.1
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  sqflite: ^2.4.3
  path: ^1.9.1
  http: ^1.2.2
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  connectivity_plus: ^6.1.0
  freezed: ">=3.2.0 <3.2.6"
  uuid: ^4.6.0
  firebase_messaging: ^16.4.3
  flutter_local_notifications: ^22.1.0
  sqflite_common_ffi_web: ^1.0.2
  google_mobile_ads: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  json_serializable: ^6.9.5
  riverpod_generator: ^4.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.22.1
flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/shortcut/
    - .env
